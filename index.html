<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakinah Initiative - Debug</title>
  <link rel="stylesheet" href="stylesindex.css" />
  <script defer src="script.js"></script>
</head>
<body>

  <h1 style="text-align:center; padding:30px; background:#004e00; color:white;">
    Debug Mode - Gebetszeiten Test
  </h1>

  <div style="max-width:800px; margin:40px auto; padding:20px; background:white; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1);">

    <h2>Stadtauswahl</h2>
    <div id="stadt-name" style="margin:15px 0; font-weight:600;"></div>
    <div id="stadt-container" style="margin-bottom:30px;"></div>

    <h2>Nächstes Gebet</h2>
    <p id="next-prayer" style="font-size:1.5rem; font-weight:bold;">Lädt...</p>
    <p id="next-prayer-countdown" style="font-size:2.2rem; font-weight:bold; color:#006d3f;">Lädt...</p>

    <h2>Aktuelles Gebet</h2>
    <p id="current-prayer" style="font-size:1.4rem;">Lädt...</p>

    <h2>Hadith & Dua Test</h2>
    <p id="hadith-arabisch" style="font-size:1.6rem; font-family:serif;">Hadith lädt...</p>
    <p id="hadith-deutsch">...</p>
    <p id="dua-arabisch" style="font-size:1.6rem; font-family:serif; margin-top:30px;">Dua lädt...</p>
    <p id="dua-deutsch">...</p>

  </div>

</body>
</html>
